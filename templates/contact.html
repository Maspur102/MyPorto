{% extends 'base.html' %}
{% block content %}
<section class="py-12 px-6 max-w-2xl mx-auto min-h-[75vh] flex flex-col justify-center">
    <div class="text-center mb-12">
        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Mari Berdiskusi</h2>
        <div class="w-16 h-1 bg-teal-500 mx-auto rounded-full"></div>
    </div>

    <form action="{{ url_for('contact') }}" method="POST" class="bg-white dark:bg-slate-800/80 backdrop-blur-xl p-8 md:p-10 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700/50">
        
        <div class="mb-6">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Nama Lengkap</label>
            <input type="text" name="nama" required placeholder="John Doe" class="w-full px-5 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all">
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email Anda</label>
            <input type="email" name="email" required placeholder="john@example.com" class="w-full px-5 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all">
        </div>
        
        <div class="mb-8">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Pesan / Ide Proyek</label>
            <textarea name="pesan" rows="4" required placeholder="Halo Purnama, saya ingin mengajak kolaborasi..." class="w-full px-5 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all resize-none"></textarea>
        </div>
        
        <button type="submit" class="w-full bg-slate-900 dark:bg-teal-600 text-white font-medium py-4 rounded-xl hover:bg-teal-600 dark:hover:bg-teal-500 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">
            Kirim Pesan Sekarang
        </button>
    </form>
</section>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<section class="py-12 px-4 max-w-xl mx-auto min-h-[80vh]">
    <h2 class="text-3xl font-bold text-center mb-8">Hubungi Saya</h2>
    <form action="{{ url_for('contact') }}" method="POST" class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Nama</label>
            <input type="text" name="nama" required class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Pesan</label>
            <textarea name="pesan" rows="4" required class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Kirim Pesan</button>
    </form>
</section>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<section class="min-h-[75vh] flex items-center justify-center px-6 relative overflow-hidden">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-teal-300/10 dark:bg-teal-900/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-slate-300/20 dark:bg-slate-800/40 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>

    <div class="text-center z-10 max-w-3xl mt-10">
        <div class="inline-flex items-center gap-2 px-4 py-2 mb-8 rounded-full bg-teal-50 dark:bg-teal-900/30 border border-teal-100 dark:border-teal-800 text-teal-700 dark:text-teal-400 text-xs font-semibold tracking-wide uppercase">
            <span class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></span>
            Tersedia untuk Kolaborasi
        </div>
        
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 text-slate-900 dark:text-white">
            Halo, Saya <br class="md:hidden">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-slate-600 dark:from-teal-400 dark:to-slate-300">Rifky Raihan</span>
        </h1>
        
        <p class="text-lg md:text-xl mb-10 text-slate-600 dark:text-slate-400 leading-relaxed font-light">
            Pengembang perangkat lunak yang berfokus pada penulisan kode yang bersih, arsitektur yang solid, dan solusi digital yang elegan.
        </p>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="{{ url_for('projects') }}" class="px-8 py-3.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-medium rounded-xl hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">
                Lihat Proyek
            </a>
            <a href="{{ url_for('contact') }}" class="px-8 py-3.5 bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-sm font-medium rounded-xl border border-slate-200 dark:border-slate-700 hover:border-teal-500 dark:hover:border-teal-500 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300">
                Hubungi Saya
            </a>
        </div>
    </div>
</section>
{% endblock %}

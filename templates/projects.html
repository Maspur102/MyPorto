{% extends 'base.html' %}
{% block content %}
<section class="py-12 px-6 max-w-6xl mx-auto min-h-[75vh]">
    <div class="text-center mb-16">
        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Etalase Proyek</h2>
        <p class="text-slate-500 dark:text-slate-400">Beberapa karya dan eksplorasi terbaru saya.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="group bg-white dark:bg-slate-800/50 rounded-2xl overflow-hidden border border-slate-100 dark:border-slate-700/50 hover:shadow-xl hover:shadow-teal-500/5 transition-all duration-300 hover:-translate-y-1 backdrop-blur-sm">
            <div class="h-52 bg-slate-100 dark:bg-slate-700/50 relative overflow-hidden flex items-center justify-center">
                <svg class="w-12 h-12 text-slate-300 dark:text-slate-600 group-hover:scale-110 group-hover:text-teal-200 dark:group-hover:text-teal-900 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
            </div>
            
            <div class="p-6">
                <h3 class="text-lg font-bold mb-2 text-slate-900 dark:text-white group-hover:text-teal-600 dark:group-hover:text-teal-400 transition-colors">Aplikasi Web Flask</h3>
                <p class="text-slate-500 dark:text-slate-400 mb-6 text-sm leading-relaxed line-clamp-2">Sistem manajemen portofolio dinamis dengan fitur multi-halaman dan antarmuka pengguna yang dirancang khusus.</p>
                
                <div class="flex flex-wrap gap-2">
                    <span class="text-[11px] font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-full tracking-wide">Python</span>
                    <span class="text-[11px] font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-full tracking-wide">Tailwind CSS</span>
                </div>
            </div>
        </div>
        
    </div>
</section>
{% endblock %}
